<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메차 카멜레온 3D</title>

    <!-- 1. Three.js 3D 엔진 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- 2. MediaPipe CDN (모션 & 손 인식) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <!-- 3. Firebase SDK (Classic CDN 방식 - 깃허브 에러 완벽 방지) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background-color: #000; color: #fff; font-family: 'Pretendard', sans-serif; overflow: hidden; }

        /* 시작 메인 화면 */
        #start-screen {
            position: absolute; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #090a0f, #1b1c2e); z-index: 1000;
        }
        #start-screen h1 { font-size: 3.2rem; text-shadow: 0 0 25px rgba(0, 255, 200, 0.8); margin-bottom: 10px; }
        #start-screen p { font-size: 1.1rem; color: #a4b0be; margin-bottom: 25px; }
        
        #wait-count { font-size: 1.3rem; color: #55efc4; font-weight: bold; margin-bottom: 35px; }

        /* 중앙 하단 버튼 그룹 */
        .btn-group { display: flex; gap: 20px; }
        .start-btn {
            padding: 16px 36px; font-size: 1.3rem; font-weight: bold;
            color: #fff; border: none; border-radius: 50px;
            cursor: pointer; transition: 0.3s;
        }
        .btn-official { background: #00b894; box-shadow: 0 0 25px rgba(0, 184, 148, 0.5); }
        .btn-official:hover { background: #55efc4; transform: scale(1.05); }
        
        .btn-beta { background: #e67e22; box-shadow: 0 0 25px rgba(230, 126, 34, 0.5); }
        .btn-beta:hover { background: #f39c12; transform: scale(1.05); }

        /* 3D 게임 화면 */
        #game-screen { display: none; width: 100vw; height: 100vh; position: relative; }
        #webgl-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

        /* UI 상단 상태바 */
        #ui-top-bar {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 25px; background: rgba(0, 0, 0, 0.85);
            padding: 12px 30px; border-radius: 30px; border: 2px solid #00cec9;
            font-size: 1.2rem; font-weight: bold; z-index: 100;
        }
        .ui-val { color: #00cec9; font-size: 1.3rem; }
        .role-tagger { color: #ff4757 !important; }
        .role-hider { color: #2ed573 !important; }

        /* 숨는 사람 개별 3분 타이머 UI */
        #personal-timer-box {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(234, 32, 39, 0.9); padding: 10px 25px; border-radius: 20px;
            font-size: 1.1rem; font-weight: bold; display: none; z-index: 100;
            border: 2px solid #ff7675; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.04); } 100% { transform: translateX(-50%) scale(1); } }

        /* 웹캠 화면 피드 */
        #webcam-container {
            position: absolute; bottom: 20px; right: 20px;
            width: 200px; height: 150px; border: 3px solid #00cec9;
            border-radius: 15px; overflow: hidden; background: #000; z-index: 100;
        }
        #webcam { width: 100%; height: 100%; transform: scaleX(-1); object-fit: cover; }

        /* 색칠 팔레트 UI */
        #paint-ui {
            position: absolute; top: 20px; left: 20px; width: 220px;
            background: rgba(18, 18, 24, 0.92); border: 2px solid #55efc4;
            border-radius: 20px; padding: 15px; display: none; flex-direction: column; gap: 10px;
            z-index: 100;
        }
        #paint-ui h3 { font-size: 1rem; color: #55efc4; text-align: center; }
        .wheel-box { display: flex; justify-content: center; }
        #color-wheel { border-radius: 50%; cursor: crosshair; border: 2px solid #fff; }
    </style>
</head>
<body>

<div id="app">
    <!-- 1. 첫 접속 화면 -->
    <div id="start-screen">
        <h1>메차 카멜레온 3D</h1>
        <p>명화 미술관 3D 모션 트래킹 숨바꼭질</p>
        <div id="wait-count">현재 서버 대기 인원: <span id="online-users">1</span>명</div>
        
        <div class="btn-group">
            <button id="official-btn" class="start-btn btn-official">🎮 5인 정식 게임 접속하기</button>
            <button id="beta-btn" class="start-btn btn-beta">🧪 테스트용 베타 접속하기</button>
        </div>
    </div>

    <!-- 2. 인게임 3D 화면 -->
    <div id="game-screen">
        <div id="webgl-container"></div>

        <div id="ui-top-bar">
            <div>전체 시간: <span id="main-timer" class="ui-val">10:00</span></div>
            <div>나의 역할: <span id="role-display" class="ui-val">-</span></div>
            <div>생존한 숨은 사람: <span id="survivor-count" class="ui-val">4</span>명</div>
        </div>

        <!-- 숨는 사람 전용 개별 3분 타이머 -->
        <div id="personal-timer-box">나의 3분 색칠 시간: <span id="personal-timer">03:00</span></div>

        <!-- 색칠 팔레트 UI -->
        <div id="paint-ui">
            <h3>🎨 3D 위장 페인트</h3>
            <div class="wheel-box">
                <canvas id="color-wheel" width="130" height="130"></canvas>
            </div>
        </div>

        <div id="webcam-container">
            <video id="webcam" autoplay playsinline muted></video>
        </div>
    </div>
</div>

<script>
// 1. 파이어베이스 초기화 (Classic SDK 방식)
const firebaseConfig = {
  apiKey: "AIzaSyCAZWS4_kRQ77cpnp1VlfiCixMzXCG-y58",
  authDomain: "mechcca.firebaseapp.com",
  projectId: "mechcca",
  storageBucket: "mechcca.firebasestorage.app",
  messagingSenderId: "114982116645",
  appId: "1:114982116645:web:51715383ee1d51efd6cecc",
  measurementId: "G-HX32TFTTJT"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();

const myPlayerId = 'player_' + Math.random().toString(36).substr(2, 9);
const CHAR_IMG_URL = "https://i.postimg.cc/nrdcqF6s/jemog-eobsneun-dijain-(1).png";
const MAP_IMG_URLS = [
    "https://i.postimg.cc/sXWZshGs/byeolo.jpg",
    "https://i.postimg.cc/pdpFc72V/mone.jpg",
    "https://i.postimg.cc/rFNxDxhY/vlzkth.jpg",
    "https://i.postimg.cc/Z5D9Nc67/monalija.jpg"
];

let scene, camera, renderer;
let myMesh, myMaterial;
let otherMeshes = {};
let myRole = "hider"; 
let mainTime = 600; // 전체 10분[cite: 1]
let personalTime = 180; // 개인 색칠 시간 3분[cite: 1]
let isTagMovable = false; // 술래 2분 이동 제한[cite: 1]
let isFrozen = false; 
let isColoringDone = false; 
let isPenaltyWhite = false;

let videoElement = document.getElementById('webcam');
let freezeLandmarks = null;
let stillStartTime = null;
let lastRightHandState = "";

// 로비 접속 카운터 등록[cite: 1]
const lobbyRef = db.ref('lobby/' + myPlayerId);
lobbyRef.set({ online: true });
lobbyRef.onDisconnect().remove();

db.ref('lobby').on('value', (snapshot) => {
    const players = snapshot.val() || {};
    document.getElementById('online-users').innerText = Object.keys(players).length;
});

// A. 5인 정식 매칭 접속[cite: 1]
document.getElementById('official-btn').addEventListener('click', async () => {
    await startCamera();
    db.ref('lobby').once('value', (snapshot) => {
        const players = snapshot.val() || {};
        const playerIds = Object.keys(players);
        let taggerId = playerIds[Math.floor(Math.random() * playerIds.length)];
        myRole = (taggerId === myPlayerId) ? "tagger" : "hider";[cite: 1]
        enterGame3D();
    });
});

// B. 테스트용 베타 접속 (혼자서 바로 테스트 가능)
document.getElementById('beta-btn').addEventListener('click', async () => {
    await startCamera();
    myRole = (Math.random() < 0.2) ? "tagger" : "hider";[cite: 1]
    enterGame3D();
});

// 웹캠 및 MediaPipe 구동
async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        videoElement.srcObject = stream;
        initMediaPipe();
    } catch (err) {
        alert("카메라 권한을 얻지 못했습니다. 브라우저 설정을 확인해주세요.");
    }
}

// 3D 공간 진입
function enterGame3D() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';

    let roleDisplay = document.getElementById('role-display');
    if (myRole === "tagger") {
        roleDisplay.innerText = "👹 술래 (크기 4배)";[cite: 1]
        roleDisplay.className = "ui-val role-tagger";
    } else {
        roleDisplay.innerText = "🥷 숨는 사람";
        roleDisplay.className = "ui-val role-hider";
    }

    init3DScene();
    initColorWheel();
    startMainTimer();
    listenOtherPlayers();
}

// Three.js 3D 환경 세팅
function init3DScene() {
    const container = document.getElementById('webgl-container');
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);[cite: 1]

    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 22, 22);
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.9));

    create3DMasterpieceFloor();
    create3DBlackWalls();
    create3DMyCharacter();

    window.addEventListener('resize', onWindowResize);
    animate3D();
}

function create3DMasterpieceFloor() {
    const loader = new THREE.TextureLoader();
    const size = 18;
    MAP_IMG_URLS.forEach((url, idx) => {
        loader.load(url, (texture) => {
            const geo = new THREE.PlaneGeometry(size, size);
            const mat = new THREE.MeshStandardMaterial({ map: texture });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.position.x = (idx % 2 === 0) ? -size/2 : size/2;
            mesh.position.z = (idx < 2) ? -size/2 : size/2;
            scene.add(mesh);
        });
    });
}

function create3DBlackWalls() {
    const wallMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide });
    const wallGeo = new THREE.PlaneGeometry(36, 18);
    const backWall = new THREE.Mesh(wallGeo, wallMat);
    backWall.position.set(0, 9, -18);
    scene.add(backWall);
}

// 캐릭터 생성 (술래 크기 4배)[cite: 1]
function create3DMyCharacter() {
    const loader = new THREE.TextureLoader();
    loader.load(CHAR_IMG_URL, (texture) => {
        let scale = (myRole === "tagger") ? 4.0 : 1.0;[cite: 1]
        let w = 3.5 * scale;
        let h = 3.5 * scale;

        const geo = new THREE.PlaneGeometry(w, h);
        myMaterial = new THREE.MeshStandardMaterial({ map: texture, transparent: true, alphaTest: 0.1 });
        myMesh = new THREE.Mesh(geo, myMaterial);
        myMesh.position.set(0, h / 2, 0);
        scene.add(myMesh);
    });
}

function animate3D() {
    requestAnimationFrame(animate3D);

    // 모션 이탈 시 캐릭터 색상 전체 흰색 페널티[cite: 1]
    if (isPenaltyWhite && myMaterial) {
        myMaterial.map = null;
        myMaterial.color.setHex(0xffffff);[cite: 1]
    }

    renderer.render(scene, camera);
}

// MediaPipe 트래킹 파이프라인[cite: 1]
function initMediaPipe() {
    const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
    pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5 });
    pose.onResults(onPoseResults);

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5 });
    hands.onResults(onHandResults);

    const cameraUtils = new Camera(videoElement, {
        onFrame: async () => {
            await pose.send({image: videoElement});
            await hands.send({image: videoElement});
        },
        width: 640, height: 480
    });
    cameraUtils.start();
}

// 몸 모션 인식: 이동 및 방향 전환[cite: 1]
function onPoseResults(results) {
    if (!results.poseLandmarks || !myMesh) return;
    let lm = results.poseLandmarks;

    if (isFrozen) return;[cite: 1]
    if (myRole === "tagger" && !isTagMovable) return;[cite: 1]

    let hipX = (lm[23].x + lm[24].x) / 2;
    let hipY = (lm[23].y + lm[24].y) / 2;

    // 달리는 모양 및 몸 이동[cite: 1]
    myMesh.position.x = (0.5 - hipX) * 30;
    myMesh.position.z = (hipY - 0.5) * 30;

    // 몸을 한 방향으로 틀면 방향 전환[cite: 1]
    let shoulderAngle = Math.atan2(lm[12].y - lm[11].y, lm[12].x - lm[11].x);
    myMesh.rotation.z = -shoulderAngle;

    // 파이어베이스 위치 동기화
    db.ref('inGamePlayers/' + myPlayerId).set({
        x: myMesh.position.x,
        z: myMesh.position.z,
        role: myRole,
        isWhite: isPenaltyWhite
    });

    // 숨는 사람: 5초 포즈 고정 시 일시정지[cite: 1]
    if (myRole === "hider" && !isFrozen) {
        if (stillStartTime === null) stillStartTime = Date.now();
        if (Date.now() - stillStartTime > 5000) {[cite: 1]
            isFrozen = true;
            freezeLandmarks = lm;
            startPersonalTimer();[cite: 1]
            alert("5초 포즈 고정 완료! 마우스와 팔레트로 캐릭터 색을 칠하세요.");[cite: 1]
        }
    }

    // 3분 개별 색칠 후 포즈 감시 ➔ 행동 변경 시 전체 흰색 변경 페널티[cite: 1]
    if (myRole === "hider" && isColoringDone && freezeLandmarks) {
        let diff = Math.abs(lm[15].x - freezeLandmarks[15].x) + Math.abs(lm[16].x - freezeLandmarks[16].x);
        if (diff > 0.18) {
            isPenaltyWhite = true;[cite: 1]
        }
    }
}

// 술래: 오른손 폈다 주먹 쥐면 잡기 성공[cite: 1]
function onHandResults(results) {
    if (!results.multiHandLandmarks || myRole !== "tagger") return;[cite: 1]

    for (let i = 0; i < results.multiHandLandmarks.length; i++) {
        if (results.multiHandedness[i].label === 'Right') {
            let h1 = results.multiHandLandmarks[i];
            let compare = [[2,4,17], [5,8,0], [9,12,0], [13,16,0], [17,20,0]];
            let folding = "";

            for (let [mcp, tip, comp] of compare) {
                let tip_dist = Math.pow(h1[comp].x - h1[tip].x, 2) + Math.pow(h1[comp].y - h1[tip].y, 2);
                let mcp_dist = Math.pow(h1[comp].x - h1[mcp].x, 2) + Math.pow(h1[comp].y - h1[mcp].y, 2);
                folding += (tip_dist > mcp_dist) ? "1" : "0";
            }

            if (folding === "00000" && lastRightHandState !== "00000") {[cite: 1]
                alert("✊ 오른손 주먹 쥐기 감지! 숨은 사람 잡기 성공!");[cite: 1]
            }
            lastRightHandState = folding;
        }
    }
}

// 실시간 다른 플레이어 위치 수신
function listenOtherPlayers() {
    db.ref('inGamePlayers').on('value', (snapshot) => {
        const players = snapshot.val() || {};
        Object.keys(players).forEach((id) => {
            if (id !== myPlayerId) {
                const p = players[id];
                if (!otherMeshes[id]) {
                    let scale = (p.role === "tagger") ? 4.0 : 1.0;[cite: 1]
                    const geo = new THREE.PlaneGeometry(3.5 * scale, 3.5 * scale);
                    const mat = new THREE.MeshStandardMaterial({ color: 0x00cec9 });
                    otherMeshes[id] = new THREE.Mesh(geo, mat);
                    scene.add(otherMeshes[id]);
                }
                otherMeshes[id].position.set(p.x, (p.role === "tagger" ? 7 : 1.75), p.z);
            }
        });
    });
}

// 메인 타이머 (전체 10분, 2분 후 술래 이동 풀림)[cite: 1]
function startMainTimer() {
    setInterval(() => {
        if (mainTime > 0) {
            mainTime--;
            let m = String(Math.floor(mainTime / 60)).padStart(2, '0');
            let s = String(mainTime % 60).padStart(2, '0');
            document.getElementById('main-timer').innerText = `${m}:${s}`;

            if (mainTime <= 480) { // 2분 지난 시점부터 술래 움직임 가능[cite: 1]
                isTagMovable = true;
            }
        }
    }, 1000);
}

// 개별 사용자별 3분 색칠 타이머[cite: 1]
function startPersonalTimer() {
    document.getElementById('personal-timer-box').style.display = 'block';
    document.getElementById('paint-ui').style.display = 'flex';

    let timer = setInterval(() => {
        if (personalTime > 0) {
            personalTime--;
            let m = String(Math.floor(personalTime / 60)).padStart(2, '0');
            let s = String(personalTime % 60).padStart(2, '0');
            document.getElementById('personal-timer').innerText = `${m}:${s}`;
        } else {
            clearInterval(timer);
            isColoringDone = true;
            document.getElementById('paint-ui').style.display = 'none';
            document.getElementById('personal-timer-box').innerText = "3분 색칠 종료! 동일한 포즈를 계속 유지하세요!";[cite: 1]
        }
    }, 1000);
}

// 위장 페인트 팔레트
function initColorWheel() {
    let wheel = document.getElementById('color-wheel');
    let ctx = wheel.getContext('2d');
    let radius = wheel.width / 2;

    for (let x = -radius; x < radius; x++) {
        for (let y = -radius; y < radius; y++) {
            let dist = Math.sqrt(x * x + y * y);
            if (dist <= radius) {
                let angle = Math.atan2(y, x);
                let hue = (angle * (180 / Math.PI) + 360) % 360;
                let sat = (dist / radius) * 100;
                ctx.fillStyle = `hsl(${hue}, ${sat}%, 50%)`;
                ctx.fillRect(x + radius, y + radius, 1, 1);
            }
        }
    }

    wheel.addEventListener('click', (e) => {
        let rect = wheel.getBoundingClientRect();
        let imgData = ctx.getImageData(e.clientX - rect.left, e.clientY - rect.top, 1, 1).data;
        let color = `rgb(${imgData[0]}, ${imgData[1]}, ${imgData[2]})`;
        if (myMaterial) myMaterial.color.setStyle(color);
    });
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>
</body>
</html>
