<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메차 카멜레온 3D - 완벽 수정판</title>

    <!-- 필수 라이브러리 CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background-color: #000; color: #fff; font-family: 'Pretendard', sans-serif; overflow: hidden; }

        /* 대기 메인 화면 */
        #start-screen {
            position: absolute; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b); z-index: 1000;
        }
        #start-screen h1 { font-size: 3rem; text-shadow: 0 0 20px #00ffcc; margin-bottom: 10px; }
        #start-screen p { font-size: 1.1rem; color: #94a3b8; margin-bottom: 30px; }

        .btn-group { display: flex; gap: 20px; }
        .start-btn {
            padding: 16px 32px; font-size: 1.2rem; font-weight: bold; color: #fff;
            border: none; border-radius: 40px; cursor: pointer; transition: 0.2s;
        }
        .btn-official { background: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .btn-official:hover { background: #059669; transform: scale(1.05); }
        .btn-beta { background: #f59e0b; box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }
        .btn-beta:hover { background: #d97706; transform: scale(1.05); }

        /* 인게임 UI */
        #game-screen { display: none; width: 100vw; height: 100vh; position: relative; }
        #webgl-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

        #ui-top-bar {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; background: rgba(0, 0, 0, 0.85);
            padding: 10px 25px; border-radius: 25px; border: 2px solid #06b6d4;
            font-size: 1.1rem; font-weight: bold; z-index: 100;
        }
        .ui-val { color: #06b6d4; font-size: 1.2rem; }

        #personal-timer-box {
            position: absolute; top: 75px; left: 50%; transform: translateX(-50%);
            background: rgba(220, 38, 38, 0.9); padding: 8px 20px; border-radius: 15px;
            font-size: 1rem; font-weight: bold; display: none; z-index: 100;
        }

        #webcam-container {
            position: absolute; bottom: 20px; right: 20px;
            width: 180px; height: 135px; border: 2px solid #06b6d4;
            border-radius: 12px; overflow: hidden; background: #000; z-index: 100;
        }
        #webcam { width: 100%; height: 100%; transform: scaleX(-1); object-fit: cover; }

        #paint-ui {
            position: absolute; top: 20px; left: 20px; width: 200px;
            background: rgba(15, 23, 42, 0.9); border: 2px solid #10b981;
            border-radius: 15px; padding: 12px; display: none; flex-direction: column; gap: 8px; z-index: 100;
        }
        #paint-ui h3 { font-size: 0.9rem; color: #10b981; text-align: center; }
        #color-wheel { border-radius: 50%; cursor: crosshair; margin: 0 auto; display: block; }
    </style>
</head>
<body>

<div id="app">
    <!-- 대기 화면 -->
    <div id="start-screen">
        <h1>메차 카멜레온 3D</h1>
        <p>명화 미술관 모션 트래킹 숨바꼭질</p>
        <div class="btn-group">
            <button id="official-btn" class="start-btn btn-official">🎮 5인 정식 게임 접속</button>
            <button id="beta-btn" class="start-btn btn-beta">🧪 테스트용 베타 접속</button>
        </div>
    </div>

    <!-- 게임 화면 -->
    <div id="game-screen">
        <div id="webgl-container"></div>

        <div id="ui-top-bar">
            <div>전체 시간: <span id="main-timer" class="ui-val">10:00</span></div>
            <div>나의 역할: <span id="role-display" class="ui-val">-</span></div>
            <div>남은 숨은 사람: <span id="survivor-count" class="ui-val">4</span>명</div>
        </div>

        <div id="personal-timer-box">나의 위장 색칠 시간: <span id="personal-timer">03:00</span></div>

        <div id="paint-ui">
            <h3>🎨 3D 캐릭터 위장 페인트</h3>
            <canvas id="color-wheel" width="120" height="120"></canvas>
        </div>

        <div id="webcam-container">
            <video id="webcam" autoplay playsinline muted></video>
        </div>
    </div>
</div>

<script>
// 게임 전역 변수
let scene, camera, renderer;
let myMesh, myMaterial;
let myRole = "hider"; 
let mainTime = 600; // 10분 전체 시간[cite: 1]
let personalTime = 180; // 개인 색칠 3분[cite: 1]
let isTagMovable = false; // 술래 2분 이동 제한[cite: 1]
let isFrozen = false; 
let isColoringDone = false; 
let isPenaltyWhite = false;

let videoElement = document.getElementById('webcam');
let freezeLandmarks = null;
let stillStartTime = null;
let lastRightHandState = "";

const CHAR_IMG_URL = "https://i.postimg.cc/nrdcqF6s/jemog-eobsneun-dijain-(1).png";
const MAP_IMG_URLS = [
    "https://i.postimg.cc/sXWZshGs/byeolo.jpg",
    "https://i.postimg.cc/pdpFc72V/mone.jpg",
    "https://i.postimg.cc/rFNxDxhY/vlzkth.jpg",
    "https://i.postimg.cc/Z5D9Nc67/monalija.jpg"
];

// 이벤트 리스너 바인딩 (즉시 반응 보장)
document.getElementById('official-btn').onclick = () => launchGame("official");
document.getElementById('beta-btn').onclick = () => launchGame("beta");

function launchGame(mode) {
    // 1. 클릭 즉시 UI 전환 (버튼 안 눌림 방지)
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';

    // 2. 역할 무작위 지정 (술래 확률 20%)[cite: 1]
    myRole = (Math.random() < 0.2) ? "tagger" : "hider";
    
    let roleDisplay = document.getElementById('role-display');
    if (myRole === "tagger") {
        roleDisplay.innerText = "👹 술래 (크기 4배)";[cite: 1]
        roleDisplay.style.color = "#ef4444";
    } else {
        roleDisplay.innerText = "🥷 숨는 사람";
        roleDisplay.style.color = "#10b981";
    }

    // 3. 3D 공간 및 카메라는 비동기로 시동
    init3DScene();
    initColorWheel();
    startMainTimer();
    initWebcamAndMediaPipe();
}

// Three.js 3D 공간 설정
function init3DScene() {
    const container = document.getElementById('webgl-container');
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);[cite: 1]

    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 20, 20);
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.0));

    // 바닥 명화 4종 배치
    const loader = new THREE.TextureLoader();
    const size = 16;
    MAP_IMG_URLS.forEach((url, idx) => {
        loader.load(url, (texture) => {
            const geo = new THREE.PlaneGeometry(size, size);
            const mat = new THREE.MeshBasicMaterial({ map: texture });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.position.x = (idx % 2 === 0) ? -size/2 : size/2;
            mesh.position.z = (idx < 2) ? -size/2 : size/2;
            scene.add(mesh);
        });
    });

    // 내 캐릭터 생성 (술래는 4배 크기)[cite: 1]
    loader.load(CHAR_IMG_URL, (texture) => {
        let scale = (myRole === "tagger") ? 4.0 : 1.0;[cite: 1]
        let w = 3.0 * scale;
        let h = 3.0 * scale;

        const geo = new THREE.PlaneGeometry(w, h);
        myMaterial = new THREE.MeshBasicMaterial({ map: texture, transparent: true, alphaTest: 0.1 });
        myMesh = new THREE.Mesh(geo, myMaterial);
        myMesh.position.set(0, h / 2, 0);
        scene.add(myMesh);
    });

    window.addEventListener('resize', onWindowResize);
    animate3D();
}

function animate3D() {
    requestAnimationFrame(animate3D);

    // 모션 이탈시 캐릭터 전체 흰색 페널티[cite: 1]
    if (isPenaltyWhite && myMaterial) {
        myMaterial.map = null;
        myMaterial.color.setHex(0xffffff);[cite: 1]
    }

    renderer.render(scene, camera);
}

// 웹캠 및 MediaPipe 백그라운드 구동
async function initWebcamAndMediaPipe() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        videoElement.srcObject = stream;

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5 });
        pose.onResults(onPoseResults);

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5 });
        hands.onResults(onHandResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await pose.send({image: videoElement});
                await hands.send({image: videoElement});
            },
            width: 640, height: 480
        });
        cameraUtils.start();
    } catch (e) {
        console.warn("웹캠 및 모션 트래킹 로딩 중:", e);
    }
}

// 실제 몸 동작 ➔ 캐릭터 트래킹 연동[cite: 1]
function onPoseResults(results) {
    if (!results.poseLandmarks || !myMesh) return;
    let lm = results.poseLandmarks;

    if (isFrozen) return; // 포즈 고정 시 이동 차단[cite: 1]
    if (myRole === "tagger" && !isTagMovable) return; // 술래 2분 고정[cite: 1]

    let hipX = (lm[23].x + lm[24].x) / 2;
    let hipY = (lm[23].y + lm[24].y) / 2;

    // 실제 이동 좌표 매핑[cite: 1]
    myMesh.position.x = (0.5 - hipX) * 25;
    myMesh.position.z = (hipY - 0.5) * 25;

    // 어깨 각도를 통해 방향 전환 트래킹[cite: 1]
    let shoulderAngle = Math.atan2(lm[12].y - lm[11].y, lm[12].x - lm[11].x);
    myMesh.rotation.z = -shoulderAngle;

    // 숨는 사람: 5초 동작 유지시 정지[cite: 1]
    if (myRole === "hider" && !isFrozen) {
        if (stillStartTime === null) stillStartTime = Date.now();
        if (Date.now() - stillStartTime > 5000) {[cite: 1]
            isFrozen = true;
            freezeLandmarks = lm;
            startPersonalTimer();[cite: 1]
            alert("5초 포즈 고정 완료! 캐릭터 색상을 칠하세요.");[cite: 1]
        }
    }

    // 3분 개별 타이머 종료 후 모션 이탈 감시 ➔ 전체 흰색 변환[cite: 1]
    if (myRole === "hider" && isColoringDone && freezeLandmarks) {
        let diff = Math.abs(lm[15].x - freezeLandmarks[15].x) + Math.abs(lm[16].x - freezeLandmarks[16].x);
        if (diff > 0.15) {
            isPenaltyWhite = true;[cite: 1]
        }
    }
}

// 술래 오른손 보자기 ➔ 주먹 잡기 감지[cite: 1]
function onHandResults(results) {
    if (!results.multiHandLandmarks || myRole !== "tagger") return;[cite: 1]

    for (let i = 0; i < results.multiHandLandmarks.length; i++) {
        if (results.multiHandedness[i].label === 'Right') {
            let h1 = results.multiHandLandmarks[i];
            let compare = [[2,4,17], [5,8,0], [9,12,0], [13,16,0], [17,20,0]];
            let folding = "";

            for (let [mcp, tip, comp] of compare) {
                let tip_dist = Math.pow(h1[comp].x - h1[tip].x, 2) + Math.pow(h1[comp].y - h1[tip].y, 2);
                let mcp_dist = Math.pow(h1[comp].x - h1[mcp].x, 2) + Math.pow(h1[comp].y - h1[mcp].y, 2);
                folding += (tip_dist > mcp_dist) ? "1" : "0";
            }

            if (folding === "00000" && lastRightHandState !== "00000") {[cite: 1]
                alert("✊ 오른손 주먹 잡기 성공! 숨은 사람을 포획했습니다!");[cite: 1]
            }
            lastRightHandState = folding;
        }
    }
}

// 타이머 시스템[cite: 1]
function startMainTimer() {
    setInterval(() => {
        if (mainTime > 0) {
            mainTime--;
            let m = String(Math.floor(mainTime / 60)).padStart(2, '0');
            let s = String(mainTime % 60).padStart(2, '0');
            document.getElementById('main-timer').innerText = `${m}:${s}`;

            if (mainTime <= 480) isTagMovable = true; // 2분 후 술래 해제[cite: 1]
        }
    }, 1000);
}

function startPersonalTimer() {
    document.getElementById('personal-timer-box').style.display = 'block';
    document.getElementById('paint-ui').style.display = 'flex';

    let timer = setInterval(() => {
        if (personalTime > 0) {
            personalTime--;
            let m = String(Math.floor(personalTime / 60)).padStart(2, '0');
            let s = String(personalTime % 60).padStart(2, '0');
            document.getElementById('personal-timer').innerText = `${m}:${s}`;
        } else {
            clearInterval(timer);
            isColoringDone = true;
            document.getElementById('paint-ui').style.display = 'none';
            document.getElementById('personal-timer-box').innerText = "3분 종료! 고정한 자세를 계속 유지하세요!";[cite: 1]
        }
    }, 1000);
}

// 팔레트 생성
function initColorWheel() {
    let wheel = document.getElementById('color-wheel');
    let ctx = wheel.getContext('2d');
    let radius = wheel.width / 2;

    for (let x = -radius; x < radius; x++) {
        for (let y = -radius; y < radius; y++) {
            let dist = Math.sqrt(x * x + y * y);
            if (dist <= radius) {
                let angle = Math.atan2(y, x);
                let hue = (angle * (180 / Math.PI) + 360) % 360;
                let sat = (dist / radius) * 100;
                ctx.fillStyle = `hsl(${hue}, ${sat}%, 50%)`;
                ctx.fillRect(x + radius, y + radius, 1, 1);
            }
        }
    }

    wheel.onclick = (e) => {
        let rect = wheel.getBoundingClientRect();
        let imgData = ctx.getImageData(e.clientX - rect.left, e.clientY - rect.top, 1, 1).data;
        let color = `rgb(${imgData[0]}, ${imgData[1]}, ${imgData[2]})`;
        if (myMaterial) myMaterial.color.setStyle(color);
    };
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>
</body>
</html>
