<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메차 카멜레온 3D - 명화 미술관 숨바꼭질</title>

    <!-- 3D 엔진 Three.js & MediaPipe Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background-color: #000; color: #fff; font-family: 'Pretendard', sans-serif; overflow: hidden; }

        /* 1. 첫 접속 화면 */
        #start-screen {
            position: absolute; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #090a0f, #1b1c2e); z-index: 1000;
        }
        #start-screen h1 { font-size: 3.5rem; text-shadow: 0 0 25px rgba(0, 255, 200, 0.8); margin-bottom: 10px; }
        #start-screen p { font-size: 1.2rem; color: #a4b0be; margin-bottom: 50px; }
        .start-btn {
            position: absolute; bottom: 80px; padding: 18px 60px; font-size: 1.8rem; font-weight: bold;
            color: #fff; background: #00b894; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 30px rgba(0, 184, 148, 0.6); transition: 0.3s;
        }
        .start-btn:hover { background: #55efc4; transform: scale(1.05); }

        /* 2. 3D 인게임 화면 */
        #game-screen { display: none; width: 100vw; height: 100vh; position: relative; }
        #webgl-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

        /* UI 헤더 */
        #ui-top-bar {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 25px; background: rgba(0, 0, 0, 0.85);
            padding: 12px 30px; border-radius: 30px; border: 2px solid #00cec9;
            font-size: 1.2rem; font-weight: bold; z-index: 100;
            box-shadow: 0 0 20px rgba(0,206,201,0.3);
        }
        .ui-val { color: #00cec9; font-size: 1.3rem; }
        .role-tagger { color: #ff4757 !important; }
        .role-hider { color: #2ed573 !important; }

        /* 개인 색칠 타이머 */
        #personal-timer-box {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(234, 32, 39, 0.9); padding: 10px 25px; border-radius: 20px;
            font-size: 1.1rem; font-weight: bold; display: none; z-index: 100;
            border: 2px solid #ff7675; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.04); } 100% { transform: translateX(-50%) scale(1); } }

        /* 웹캠 피드 (우측 하단) */
        #webcam-container {
            position: absolute; bottom: 20px; right: 20px;
            width: 220px; height: 165px; border: 3px solid #00cec9;
            border-radius: 15px; overflow: hidden; background: #000; z-index: 100;
        }
        #webcam { width: 100%; height: 100%; transform: scaleX(-1); object-fit: cover; }

        /* 팔레트 UI */
        #paint-ui {
            position: absolute; top: 20px; left: 20px; width: 260px;
            background: rgba(18, 18, 24, 0.92); border: 2px solid #55efc4;
            border-radius: 20px; padding: 15px; display: none; flex-direction: column; gap: 12px;
            z-index: 100; backdrop-filter: blur(8px);
        }
        #paint-ui h3 { font-size: 1.1rem; color: #55efc4; text-align: center; }
        .wheel-box { display: flex; justify-content: center; }
        #color-wheel { border-radius: 50%; cursor: crosshair; border: 2px solid #fff; }
        .preview-row { display: flex; justify-content: space-between; align-items: center; }
        #color-preview { width: 45px; height: 35px; border-radius: 8px; border: 2px solid #fff; background: #000; }
        .btn-eyedropper {
            padding: 8px 14px; background: #0984e3; color: #fff; border: none;
            border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="app">
    <!-- 1. 접속 대기 화면 -->
    <div id="start-screen">
        <h1>메차 카멜레온 3D</h1>
        <p>명화 미술관 3D 공간 & 실시간 포즈 트래킹</p>
        <button class="start-btn" onclick="connectAndStart()">게임 접속하기</button>
    </div>

    <!-- 2. 인게임 3D 화면 -->
    <div id="game-screen">
        <div id="webgl-container"></div>

        <!-- 상단 헤더 UI -->
        <div id="ui-top-bar">
            <div>전체 시간: <span id="main-timer" class="ui-val">10:00</span></div>
            <div>나의 역할: <span id="role-display" class="ui-val">-</span></div>
            <div>생존한 숨은 사람: <span id="survivor-count" class="ui-val">4</span>명</div>
        </div>

        <!-- 개인 타이머 -->
        <div id="personal-timer-box">나의 3분 색칠 시간: <span id="personal-timer">03:00</span></div>

        <!-- 팔레트 UI -->
        <div id="paint-ui">
            <h3>🎨 3D 위장 페인트</h3>
            <div class="wheel-box">
                <canvas id="color-wheel" width="150" height="150"></canvas>
            </div>
            <div class="preview-row">
                <div id="color-preview"></div>
                <button class="btn-eyedropper" onclick="toggleEyedropper()">🖌️ 3D 스포이트</button>
            </div>
        </div>

        <!-- 웹캠 피드 -->
        <div id="webcam-container">
            <video id="webcam" autoplay playsinline muted></video>
        </div>
    </div>
</div>

<script>
// --- 전역 변수 및 이미지 URL ---
const CHAR_IMG_URL = "https://i.postimg.cc/nrdcqF6s/jemog-eobsneun-dijain-(1).png";
const MAP_IMG_URLS = [
    "https://i.postimg.cc/sXWZshGs/byeolo.jpg",     // 고흐
    "https://i.postimg.cc/pdpFc72V/mone.jpg",       // 모네
    "https://i.postimg.cc/rFNxDxhY/vlzkth.jpg",     // 명화 3
    "https://i.postimg.cc/Z5D9Nc67/monalija.jpg"   // 모나리자
];

let scene, camera, renderer;
let characterMesh, characterMaterial, characterTexture;
let myRole = "hider"; // "tagger" or "hider"
let mainTime = 600; // 10분
let personalTime = 180; // 3분
let isTagMovable = false; // 술래 2분 이동 제한
let isFrozen = false; // 5초 정지 성공 여부
let isColoringDone = false; // 3분 색칠 종료 여부
let isPenaltyWhite = false;

let videoElement = document.getElementById('webcam');
let freezeLandmarks = null;
let stillStartTime = null;
let selectedColor = "#000000";
let isEyedropperActive = false;
let lastRightHandState = "";

// 1. 게임 접속 및 카메라 권한 승인
async function connectAndStart() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        videoElement.srcObject = stream;

        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';

        // 술래 무작위 지정 (20% 확률)[cite: 1]
        myRole = (Math.random() < 0.2) ? "tagger" : "hider";[cite: 1]
        let roleDisplay = document.getElementById('role-display');

        if (myRole === "tagger") {
            roleDisplay.innerText = "👹 술래 (크기 4배)";[cite: 1]
            roleDisplay.className = "ui-val role-tagger";
        } else {
            roleDisplay.innerText = "🥷 숨는 사람";
            roleDisplay.className = "ui-val role-hider";
        }

        init3DScene();
        initColorWheel();
        initMediaPipe();
        startMainTimer();

    } catch (err) {
        alert("카메라 권한을 승인해야 게임 진행이 가능합니다.");
        console.error(err);
    }
}

// 2. 3D 공간 구축 (Three.js)
function init3DScene() {
    const container = document.getElementById('webgl-container');
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000); // 3D 공간 벽면/배경 = 검정색

    // 시점: 공중에서 입체적으로 내려다보는 카메라
    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 25, 25);
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    // 조명
    const ambient = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambient);

    // A. 3D 바닥: 4개의 명화 패널을 3D 바닥(X-Z 평면)으로 깔기
    create3DMasterpieceFloor();

    // B. 3D 검은색 벽면 생성
    create3DBlackWalls();

    // C. 주인공 3D 캐릭터 (바닥과 수직으로 서도록 스프라이트/메쉬 배치)
    create3DCharacter();

    window.addEventListener('resize', onWindowResize);
    animate3D();
}

// 명화 바닥 (X-Z 평면)
function create3DMasterpieceFloor() {
    const loader = new THREE.TextureLoader();
    const size = 20; // 각 패널 크기

    MAP_IMG_URLS.forEach((url, idx) => {
        loader.load(url, (texture) => {
            const geo = new THREE.PlaneGeometry(size, size);
            const mat = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.4 });
            const mesh = new THREE.Mesh(geo, mat);

            mesh.rotation.x = -Math.PI / 2; // 바닥 평면으로 회전
            
            // 2x2 패치워크 배치
            mesh.position.x = (idx % 2 === 0) ? -size/2 : size/2;
            mesh.position.z = (idx < 2) ? -size/2 : size/2;
            mesh.position.y = 0;

            scene.add(mesh);
        });
    });
}

// 3D 검은색 벽면
function create3DBlackWalls() {
    const wallMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide });
    const wallGeo = new THREE.PlaneGeometry(40, 20);

    // 뒷벽, 좌벽, 우벽
    const backWall = new THREE.Mesh(wallGeo, wallMat);
    backWall.position.set(0, 10, -20);
    scene.add(backWall);

    const leftWall = new THREE.Mesh(wallGeo, wallMat);
    leftWall.rotation.y = Math.PI / 2;
    leftWall.position.set(-20, 10, 0);
    scene.add(leftWall);

    const rightWall = new THREE.Mesh(wallGeo, wallMat);
    rightWall.rotation.y = -Math.PI / 2;
    rightWall.position.set(20, 10, 0);
    scene.add(rightWall);
}

// 3D 캐릭터 (바닥과 수직으로 생성)
function create3DCharacter() {
    const loader = new THREE.TextureLoader();
    loader.load(CHAR_IMG_URL, (texture) => {
        characterTexture = texture;
        
        // 술래는 숨는 사람의 4배 크기[cite: 1]
        let scale = (myRole === "tagger") ? 4.0 : 1.0;[cite: 1]
        let w = 4 * scale;
        let h = 4 * scale;

        const geo = new THREE.PlaneGeometry(w, h);
        characterMaterial = new THREE.MeshStandardMaterial({
            map: texture,
            transparent: true,
            alphaTest: 0.1,
            side: THREE.DoubleSide
        });

        characterMesh = new THREE.Mesh(geo, characterMaterial);
        
        // **바닥과 정확히 수직(Standing) 상태 세팅**
        characterMesh.position.set(0, h / 2, 0);
        scene.add(characterMesh);
    });
}

function animate3D() {
    requestAnimationFrame(animate3D);

    // 페널티 적용 시 흰색으로 변환
    if (isPenaltyWhite && characterMaterial) {
        characterMaterial.map = null;
        characterMaterial.color.setHex(0xffffff);
    }

    renderer.render(scene, camera);
}

// 3. MediaPipe 실시간 트래킹 (웹캠 ➔ 3D 캐릭터 관절/좌표 연동)
function initMediaPipe() {
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5 });
    hands.onResults(onHandResults);

    const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
    pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5 });
    pose.onResults(onPoseResults);

    const cameraUtils = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
            await pose.send({image: videoElement});
        },
        width: 640, height: 480
    });
    cameraUtils.start();
}

// 사람의 움직임(Pose) 트래킹 ➔ 3D 캐릭터 실시간 좌표/관절 연동
function onPoseResults(results) {
    if (!results.poseLandmarks || !characterMesh) return;
    let lm = results.poseLandmarks;

    if (isFrozen) return; // 5초 정지 시 위치 고정[cite: 1]
    if (myRole === "tagger" && !isTagMovable) return; // 술래 2분 이동 제한[cite: 1]

    // **관절 좌표 매핑 (실제 몸의 엉덩이/어깨 중앙점을 3D 공간 좌표로 계산)**
    let hipX = (lm[23].x + lm[24].x) / 2;
    let hipY = (lm[23].y + lm[24].y) / 2;

    // MediaPipe 좌표계 (0~1) ➔ 3D 공간 (X: -18 ~ 18, Z: -18 ~ 18) 변환
    let targetX = (0.5 - hipX) * 36; 
    let targetZ = (hipY - 0.5) * 36;

    // 실시간 캐릭터 3D 위치 반영
    characterMesh.position.x = targetX;
    characterMesh.position.z = targetZ;

    // 좌/우 상체 기울임(어깨 기울기)을 3D 캐릭터 회전에 반영
    let shoulderAngle = Math.atan2(lm[12].y - lm[11].y, lm[12].x - lm[11].x);
    characterMesh.rotation.z = -shoulderAngle;

    // --- A. 5초 포즈 정지 감지 ---
    if (myRole === "hider" && !isFrozen) {
        if (stillStartTime === null) stillStartTime = Date.now();
        if (Date.now() - stillStartTime > 5000) {[cite: 1]
            isFrozen = true;
            freezeLandmarks = lm;
            startPersonalTimer(); // 3분 색칠 시작[cite: 1]
            alert("5초 포즈 고정 완료! 이제 마우스로 캐릭터에 색을 칠하세요.");[cite: 1]
        }
    }

    // --- B. 3분 색칠 종료 후 포즈 이탈 감시 ---
    if (myRole === "hider" && isColoringDone && freezeLandmarks) {
        let diff = Math.abs(lm[15].x - freezeLandmarks[15].x) + Math.abs(lm[16].x - freezeLandmarks[16].x);
        if (diff > 0.18) {
            isPenaltyWhite = true; // 포즈 이탈 시 흰색 변환 페널티[cite: 1]
        }
    }
}

// 술래 오른손 잡기 (손 펴짐 -> 주먹 쥐기 00000)[cite: 1]
function onHandResults(results) {
    if (!results.multiHandLandmarks || myRole !== "tagger") return;[cite: 1]

    for (let i = 0; i < results.multiHandLandmarks.length; i++) {
        if (results.multiHandedness[i].label === 'Right') {
            let h1 = results.multiHandLandmarks[i];
            let compare = [[2,4,17], [5,8,0], [9,12,0], [13,16,0], [17,20,0]];
            let folding = "";

            for (let [mcp, tip, comp] of compare) {
                let tip_dist = Math.pow(h1[comp].x - h1[tip].x, 2) + Math.pow(h1[comp].y - h1[tip].y, 2);
                let mcp_dist = Math.pow(h1[comp].x - h1[mcp].x, 2) + Math.pow(h1[comp].y - h1[mcp].y, 2);
                folding += (tip_dist > mcp_dist) ? "1" : "0";
            }

            if (folding === "00000" && lastRightHandState !== "00000") {[cite: 1]
                alert("오른손 주먹 쥐기 감지! 전방의 숨은 사람을 잡았습니다!");[cite: 1]
            }
            lastRightHandState = folding;
        }
    }
}

// 4. 타이머 시스템[cite: 1]
function startMainTimer() {
    setInterval(() => {
        if (mainTime > 0) {
            mainTime--;
            let m = String(Math.floor(mainTime / 60)).padStart(2, '0');
            let s = String(mainTime % 60).padStart(2, '0');
            document.getElementById('main-timer').innerText = `${m}:${s}`;

            if (mainTime <= 480) { // 2분 후 술래 이동 가능[cite: 1]
                isTagMovable = true;
            }
        }
    }, 1000);
}

function startPersonalTimer() {
    document.getElementById('personal-timer-box').style.display = 'block';
    document.getElementById('paint-ui').style.display = 'flex';

    let timer = setInterval(() => {
        if (personalTime > 0) {
            personalTime--;
            let m = String(Math.floor(personalTime / 60)).padStart(2, '0');
            let s = String(personalTime % 60).padStart(2, '0');
            document.getElementById('personal-timer').innerText = `${m}:${s}`;
        } else {
            clearInterval(timer);
            isColoringDone = true;
            document.getElementById('paint-ui').style.display = 'none';
            document.getElementById('personal-timer-box').innerText = "3분 색칠 종료! 동일한 포즈를 고정하세요!";[cite: 1]
        }
    }, 1000);
}

// 5. 팔레트 & 3D 스포이트
function initColorWheel() {
    let wheel = document.getElementById('color-wheel');
    let ctx = wheel.getContext('2d');
    let radius = wheel.width / 2;

    for (let x = -radius; x < radius; x++) {
        for (let y = -radius; y < radius; y++) {
            let dist = Math.sqrt(x * x + y * y);
            if (dist <= radius) {
                let angle = Math.atan2(y, x);
                let hue = (angle * (180 / Math.PI) + 360) % 360;
                let sat = (dist / radius) * 100;
                ctx.fillStyle = `hsl(${hue}, ${sat}%, 50%)`;
                ctx.fillRect(x + radius, y + radius, 1, 1);
            }
        }
    }

    wheel.addEventListener('click', (e) => {
        let rect = wheel.getBoundingClientRect();
        let x = e.clientX - rect.left;
        let y = e.clientY - rect.top;
        let imgData = ctx.getImageData(x, y, 1, 1).data;
        selectedColor = `rgb(${imgData[0]}, ${imgData[1]}, ${imgData[2]})`;
        document.getElementById('color-preview').style.background = selectedColor;
        
        if (characterMaterial) {
            characterMaterial.color.setStyle(selectedColor); // 3D 캐릭터 색상 변환
        }
    });
}

function toggleEyedropper() {
    alert("3D 스포이트 활성화: 바닥 명화를 클릭하면 3D 캐릭터 색상이 해당 명화 색으로 바뀝니다.");
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>
</body>
</html>
