<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메차 카멜레온 3D</title>

  <!-- Three.js (3D Graphics Engine) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- MediaPipe Pose & Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Noto Sans KR', sans-serif; color: #fff; }

    #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

    /* 메인 메뉴 */
    #menu-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 100;
    }

    #menu-screen h1 {
      font-size: 3.2rem; margin-bottom: 2rem; color: #00ffcc;
      text-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
    }

    .btn-group { display: flex; gap: 20px; }

    button {
      padding: 16px 36px; font-size: 1.2rem; font-weight: bold; color: #fff;
      background: linear-gradient(135deg, #ff007f, #7f00ff);
      border: none; border-radius: 40px; cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: all 0.3s ease;
    }

    button:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 8px 25px rgba(255, 0, 127, 0.5); }

    /* HUD 레이어 */
    #hud {
      display: none; position: absolute; top: 20px; left: 20px; z-index: 10;
      background: rgba(0, 0, 0, 0.7); padding: 15px 25px; border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2); font-size: 1.1rem; line-height: 1.6;
    }

    #motion-status {
      margin-top: 10px; padding: 5px 10px; background: rgba(0, 255, 204, 0.2);
      border-radius: 5px; color: #00ffcc; font-weight: bold;
    }

    #freeze-countdown {
      margin-top: 5px; color: #ff007f; font-weight: bold; font-size: 1.3rem; display: none;
    }

    /* 웹캠 피드 */
    #webcam-container {
      position: absolute; bottom: 20px; right: 20px; width: 240px; height: 180px;
      border: 2px solid #00ffcc; border-radius: 12px; overflow: hidden; z-index: 10;
      background: #111; transform: scaleX(-1);
    }

    video { width: 100%; height: 100%; object-fit: cover; }

    /* 고급 그래픽 색칠 오버레이 UI */
    #paint-container {
      display: none; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); z-index: 200;
      background: rgba(18, 18, 18, 0.95); padding: 20px; border-radius: 16px;
      border: 2px solid #00ffcc; box-shadow: 0 0 30px rgba(0, 255, 204, 0.3); text-align: center;
    }

    .paint-workspace { display: flex; gap: 20px; align-items: center; margin-top: 10px; }

    #paint-canvas {
      border: 2px solid #555; background: #fff; cursor: crosshair; border-radius: 8px;
    }

    /* 고급 팔레트 UI 스타일 */
    .palette-panel {
      display: flex; flex-direction: column; gap: 12px; background: #222;
      padding: 15px; border-radius: 12px; border: 1px solid #444; width: 220px; text-align: left;
    }

    .palette-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; }

    .color-picker-wrapper { display: flex; align-items: center; gap: 10px; }

    input[type="color"] {
      -webkit-appearance: none; border: none; width: 45px; height: 45px;
      border-radius: 50%; cursor: pointer; background: none;
    }

    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: 2px solid #fff; border-radius: 50%; }

    .brush-size-slider { width: 100%; }

    .btn-finish {
      margin-top: 15px; width: 100%; padding: 10px; font-size: 1rem; font-weight: bold;
      background: #00ffcc; color: #000; border: none; border-radius: 8px; cursor: pointer;
      transition: background 0.2s;
    }

    .btn-finish:hover { background: #00cca3; }
  </style>
</head>
<body>

  <!-- 메뉴 화면 -->
  <div id="menu-screen">
    <h1>메차 카멜레온 3D</h1>
    <div class="btn-group">
      <button onclick="startGame('beta')">베타 버전 접속 (1인 전용)</button>
      <button onclick="startGame('normal')">일반 게임 접속 (5인)</button>
    </div>
  </div>

  <!-- HUD 게임 정보 -->
  <div id="hud">
    <div>모드: <span id="mode-display">베타</span></div>
    <div>전체 남은 시간: <span id="main-timer">10:00</span></div>
    <div>남은 숨은 사람: <span id="hider-count">4</span>명</div>
    <div>내 역할: <span id="role-display">-</span></div>
    <div id="motion-status">감지 동작: 정지</div>
    <div id="pose-status" style="color: #edee15; font-weight: bold;">자세: 서 있음</div>
    <div id="freeze-countdown">고정까지: <span id="count-num">5</span>초 (양손 주먹 유지)</div>
    <div id="paint-timer-group" style="display:none; color:#00ffcc;">색칠 남은 시간: <span id="paint-timer">03:00</span></div>
  </div>

  <!-- 웹캠 피드 -->
  <div id="webcam-container">
    <video id="webcam" autoplay playsinline muted></video>
  </div>

  <!-- 고급 팔레트 지원 색칠 UI -->
  <div id="paint-container">
    <h3 style="color:#00ffcc;">🎨 고급 팔레트 위장 색칠 (마우스 드래그)</h3>
    <div class="paint-workspace">
      <!-- 드로잉 캔버스 -->
      <canvas id="paint-canvas" width="250" height="350"></canvas>

      <!-- 고급 색상 조절 팔레트 -->
      <div class="palette-panel">
        <div class="palette-row">
          <span>색상 휠/스포이드</span>
          <div class="color-picker-wrapper">
            <input type="color" id="html5-color-picker" value="#ff0000" onchange="updateBrushColor(this.value)">
          </div>
        </div>

        <div class="palette-row">
          <span>현재 색상 프리뷰</span>
          <div id="color-preview" style="width: 30px; height: 30px; background: #ff0000; border-radius: 6px; border: 1px solid #fff;"></div>
        </div>

        <hr style="border-color: #444;">

        <div class="palette-row">
          <span>붓 두께 (<span id="brush-size-val">8</span>px)</span>
        </div>
        <input type="range" class="brush-size-slider" min="2" max="30" value="8" oninput="updateBrushSize(this.value)">

        <button class="btn-finish" onclick="finishPainting()">완료 (움직임 재개)</button>
      </div>
    </div>
  </div>

  <!-- 3D 렌더링 영역 -->
  <div id="canvas-container"></div>

  <script>
    const FLOOR_IMAGES = [
      'https://i.postimg.cc/rFNxDxhY/vlzkth.jpg',
      'https://i.postimg.cc/pdpFc72V/mone.jpg',
      'https://i.postimg.cc/sXWZshGs/byeolo.jpg',
      'https://i.postimg.cc/Z5D9Nc67/monalija.jpg'
    ];
    const CHAR_IMAGE_URL = 'https://i.postimg.cc/nrdcqF6s/jemog-eobsneun-dijain-(1).png';

    let scene, camera, renderer;
    let myPlayerGroup, mySpriteMesh;
    let isBetaMode = false, isGameActive = false;
    let isFrozen = false; 

    // 게임 규칙 변수
    let userRole = 'hider';
    let totalGameTime = 600;
    let hiderPaintTime = 180;

    // 자세 및 모션 상태
    let currentMotion = 'STOP'; 
    let currentPoseState = 'STAND';
    let moveSpeed = 0.12, rotationSpeed = 0.04, prevNoseY = 0;

    // 카운트다운 타이머
    let bothFistHoldTime = 0;
    let freezeTimerInterval = null;

    // 드로잉 및 고급 팔레트 상태 변수
    let paintCanvas, paintCtx;
    let currentColor = '#ff0000';
    let currentLineWidth = 8;
    let isDrawing = false;
    let lastX = 0, lastY = 0;

    function init3D() {
      const container = document.getElementById('canvas-container');
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 15, 20);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      container.appendChild(renderer.domElement);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
      scene.add(ambientLight);

      // 명화 바닥 4분할
      const textureLoader = new THREE.TextureLoader();
      const floorGroup = new THREE.Group();
      FLOOR_IMAGES.forEach((url, idx) => {
        textureLoader.load(url, (texture) => {
          const geometry = new THREE.PlaneGeometry(20, 20);
          const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
          const mesh = new THREE.Mesh(geometry, material);
          mesh.rotation.x = -Math.PI / 2;
          mesh.position.x = (idx % 2 === 0 ? -10 : 10);
          mesh.position.z = (idx < 2 ? -10 : 10);
          floorGroup.add(mesh);
        });
      });
      scene.add(floorGroup);

      window.addEventListener('resize', onWindowResize);
      initPaintCanvas();
    }

    function create3DCharacter(isSeeker = false) {
      const group = new THREE.Group();
      const textureLoader = new THREE.TextureLoader();

      textureLoader.load(CHAR_IMAGE_URL, (texture) => {
        const material = new THREE.SpriteMaterial({ map: texture });
        mySpriteMesh = new THREE.Sprite(material);

        const scale = isSeeker ? 8 : 2;
        mySpriteMesh.scale.set(scale, scale, 1);
        mySpriteMesh.position.y = scale / 2;
        group.add(mySpriteMesh);
      });

      group.position.set(0, 0, 0);
      scene.add(group);
      return group;
    }

    async function startGame(mode) {
      isBetaMode = (mode === 'beta');
      document.getElementById('menu-screen').style.display = 'none';
      document.getElementById('hud').style.display = 'block';

      init3D();
      await initCameraAndMediaPipe();

      if (isBetaMode) {
        userRole = 'hider';
        document.getElementById('role-display').innerText = '숨는 사람 (1인 베타)';
        document.getElementById('hider-count').innerText = '1';
        myPlayerGroup = create3DCharacter(false);
      } else {
        const isSeekerRole = Math.random() < 0.2;
        userRole = isSeekerRole ? 'seeker' : 'hider';
        document.getElementById('role-display').innerText = userRole === 'seeker' ? '술래 (크기 4배)' : '숨는 사람';
        myPlayerGroup = create3DCharacter(userRole === 'seeker');
      }

      isGameActive = true;
      startMainTimers();
      animate();
    }

    async function initCameraAndMediaPipe() {
      const videoElement = document.getElementById('webcam');

      const pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
      pose.setOptions({ modelComplexity: 1, smoothLandmarks: true });
      pose.onResults(onPoseResults);

      const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
      hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7 });
      hands.onResults(onHandResults);

      const cameraUtil = new Camera(videoElement, {
        onFrame: async () => {
          await pose.send({ image: videoElement });
          await hands.send({ image: videoElement });
        },
        width: 640, height: 480
      });
      cameraUtil.start();
    }

    function onPoseResults(results) {
      if (!results.poseLandmarks || isFrozen) return;

      const nose = results.poseLandmarks[0];
      const leftHip = results.poseLandmarks[23];
      const rightHip = results.poseLandmarks[24];
      const hipY = (leftHip && rightHip) ? (leftHip.y + rightHip.y) / 2 : 0.8;

      if (nose.y > 0.75) {
        currentPoseState = 'LIE';
      } else if (hipY > 0.65 || nose.y > 0.5) {
        currentPoseState = 'SIT';
      } else {
        currentPoseState = 'STAND';
      }

      if (prevNoseY !== 0) {
        const deltaY = Math.abs(nose.y - prevNoseY);
        if (deltaY > 0.015 && currentMotion !== 'LEFT' && currentMotion !== 'RIGHT') {
          currentMotion = 'RUN';
        } else if (currentMotion === 'RUN') {
          currentMotion = 'STOP';
        }
      }
      prevNoseY = nose.y;
      updateStatusUI();
    }

    function onHandResults(results) {
      if (isFrozen) return;

      let fistCount = 0;
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        results.multiHandLandmarks.forEach((landmarks, idx) => {
          if (checkIsFist(landmarks)) fistCount++;

          const handedness = results.multiHandedness[idx].label;
          if (fistCount === 1) {
            if (handedness === 'Left') currentMotion = 'RIGHT';
            else if (handedness === 'Right') currentMotion = 'LEFT';
          }
        });
      }

      if (userRole === 'hider' && fistCount >= 2) {
        currentMotion = 'BOTH_FIST';
        startFreezeCountdown();
      } else {
        resetFreezeCountdown();
        if (fistCount === 0 && currentMotion !== 'RUN') currentMotion = 'STOP';
      }
      updateStatusUI();
    }

    function checkIsFist(landmarks) {
      const wrist = landmarks[0];
      let folded = 0;
      [8, 12, 16, 20].forEach(tipIdx => {
        if (getDistance(landmarks[tipIdx], wrist) < getDistance(landmarks[tipIdx - 2], wrist)) folded++;
      });
      return folded >= 3;
    }

    function getDistance(p1, p2) { return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2)); }

    function startFreezeCountdown() {
      const countdownElem = document.getElementById('freeze-countdown');
      countdownElem.style.display = 'block';

      if (!freezeTimerInterval) {
        bothFistHoldTime = 5;
        document.getElementById('count-num').innerText = bothFistHoldTime;
        freezeTimerInterval = setInterval(() => {
          bothFistHoldTime--;
          document.getElementById('count-num').innerText = bothFistHoldTime;

          if (bothFistHoldTime <= 0) {
            clearInterval(freezeTimerInterval);
            freezeTimerInterval = null;
            triggerFreezeAndPaintMode();
          }
        }, 1000);
      }
    }

    function resetFreezeCountdown() {
      if (freezeTimerInterval) {
        clearInterval(freezeTimerInterval);
        freezeTimerInterval = null;
      }
      document.getElementById('freeze-countdown').style.display = 'none';
    }

    function triggerFreezeAndPaintMode() {
      isFrozen = true;
      currentMotion = 'FROZEN';
      document.getElementById('freeze-countdown').style.display = 'none';
      document.getElementById('paint-container').style.display = 'block';
      document.getElementById('paint-timer-group').style.display = 'block';
    }

    function finishPainting() {
      isFrozen = false;
      document.getElementById('paint-container').style.display = 'none';
      currentMotion = 'STOP';
      updateStatusUI();
    }

    function startMainTimers() {
      setInterval(() => {
        if (!isGameActive) return;

        if (totalGameTime > 0) {
          totalGameTime--;
          let m = Math.floor(totalGameTime / 60), s = totalGameTime % 60;
          document.getElementById('main-timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        if (isFrozen && hiderPaintTime > 0) {
          hiderPaintTime--;
          let pm = Math.floor(hiderPaintTime / 60), ps = hiderPaintTime % 60;
          document.getElementById('paint-timer').innerText = `${pm}:${ps < 10 ? '0' : ''}${ps}`;
        }
      }, 1000);
    }

    /* --- 마우스 드래그 '선(Line)' 그리기 및 팔레트 처리 --- */
    function initPaintCanvas() {
      paintCanvas = document.getElementById('paint-canvas');
      paintCtx = paintCanvas.getContext('2d');

      const img = new Image();
      img.crossOrigin = "Anonymous";
      img.src = CHAR_IMAGE_URL;
      img.onload = () => paintCtx.drawImage(img, 0, 0, 250, 350);

      // 마우스 이벤트 연동 (연속적인 선 그리기)
      paintCanvas.addEventListener('mousedown', startDrawing);
      paintCanvas.addEventListener('mousemove', drawLine);
      paintCanvas.addEventListener('mouseup', stopDrawing);
      paintCanvas.addEventListener('mouseleave', stopDrawing);
    }

    function startDrawing(e) {
      isDrawing = true;
      const rect = paintCanvas.getBoundingClientRect();
      lastX = e.clientX - rect.left;
      lastY = e.clientY - rect.top;
    }

    function drawLine(e) {
      if (!isDrawing) return;
      const rect = paintCanvas.getBoundingClientRect();
      const currentX = e.clientX - rect.left;
      const currentY = e.clientY - rect.top;

      paintCtx.beginPath();
      paintCtx.moveTo(lastX, lastY);
      paintCtx.lineTo(currentX, currentY);
      paintCtx.strokeStyle = currentColor;
      paintCtx.lineWidth = currentLineWidth;
      paintCtx.lineCap = 'round';
      paintCtx.lineJoin = 'round';
      paintCtx.stroke();

      lastX = currentX;
      lastY = currentY;

      // 3D 텍스처 실시간 업데이트
      if (mySpriteMesh) {
        mySpriteMesh.material.map = new THREE.CanvasTexture(paintCanvas);
        mySpriteMesh.material.needsUpdate = true;
      }
    }

    function stopDrawing() {
      isDrawing = false;
    }

    function updateBrushColor(colorVal) {
      currentColor = colorVal;
      document.getElementById('color-preview').style.background = colorVal;
    }

    function updateBrushSize(sizeVal) {
      currentLineWidth = sizeVal;
      document.getElementById('brush-size-val').innerText = sizeVal;
    }

    function updateStatusUI() {
      const statusText = {
        'RUN': '🏃 달리는 중',
        'LEFT': '↩️ 좌회전 중',
        'RIGHT': '↪️ 우회전 중',
        'BOTH_FIST': '✊✊ 양손 주먹 (고정 대기 중)',
        'FROZEN': '🧊 고정 및 색칠 중',
        'STOP': '🛑 정지'
      };
      const poseText = {
        'STAND': '👤 자세: 서 있음',
        'SIT': '🧘 자세: 앉아 있음',
        'LIE': '🛌 자세: 누워 있음'
      };
      document.getElementById('motion-status').innerText = `감지 동작: ${statusText[currentMotion] || '정지'}`;
      document.getElementById('pose-status').innerText = poseText[currentPoseState];
    }

    function animate() {
      if (!isGameActive) return;
      requestAnimationFrame(animate);

      if (myPlayerGroup && !isFrozen) {
        if (currentMotion === 'RUN') myPlayerGroup.translateZ(-moveSpeed);
        else if (currentMotion === 'LEFT') myPlayerGroup.rotation.y += rotationSpeed;
        else if (currentMotion === 'RIGHT') myPlayerGroup.rotation.y -= rotationSpeed;

        if (mySpriteMesh) {
          const baseScale = (userRole === 'seeker') ? 8 : 2;

          if (currentPoseState === 'LIE') {
            mySpriteMesh.rotation.x = -Math.PI / 2;
            mySpriteMesh.position.y = 0.2;
            mySpriteMesh.scale.set(baseScale, baseScale, 1);
          } else if (currentPoseState === 'SIT') {
            mySpriteMesh.rotation.x = 0;
            mySpriteMesh.scale.set(baseScale, baseScale * 0.6, 1);
            mySpriteMesh.position.y = (baseScale * 0.6) / 2;
          } else {
            mySpriteMesh.rotation.x = 0;
            mySpriteMesh.scale.set(baseScale, baseScale, 1);
            mySpriteMesh.position.y = baseScale / 2;
          }
        }

        const relativeOffset = new THREE.Vector3(0, 8, 14);
        const camPos = relativeOffset.applyMatrix4(myPlayerGroup.matrixWorld);
        camera.position.copy(camPos);
        camera.lookAt(myPlayerGroup.position);
      }

      renderer.render(scene, camera);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
  </script>
</body>
</html>
